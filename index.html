<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوته تلمذه</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a2225; --gold: #cf9f3e; --cream: #fdfaf1; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--cream); color: var(--primary); direction: rtl; }
        header { background: var(--primary); padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); border-radius: 0 0 30px 30px; position: sticky; top: 0; z-index: 100; }
        header h2 { color: var(--gold); border: 2px solid var(--gold); display: inline-block; padding: 5px 25px; border-radius: 20px; font-weight: 900; }
        .hero { text-align: center; padding: 20px; }
        .badge { background: var(--gold); padding: 5px 40px; border-radius: 20px; display: inline-block; font-weight: 900; margin-top: 10px; border: 2px solid var(--primary); }
        .form-section { background: var(--primary); padding: 30px 15px 80px; border-radius: 40px 40px 0 0; margin-top: 20px; }
        .row { background: var(--gold); padding: 12px; margin-bottom: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .row span { font-weight: 800; font-size: 16px; color: var(--primary); }
        input[type="text"], input[type="date"], select { width: 55%; padding: 10px; border-radius: 10px; border: none; font-weight: 600; outline: none; }
        .date-weekly { flex-direction: column; align-items: flex-start; gap: 10px; }
        .date-range-group { display: flex; gap: 8px; width: 100%; }
        .date-range-item { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .date-range-item label { font-size: 12px; font-weight: 900; color: var(--primary); opacity: 0.7; }
        .date-range-item input[type="date"] { width: 100%; font-size: 13px; padding: 8px; }
        .options-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .options-group label { background: rgba(255,255,255,0.4); padding: 6px 12px; border-radius: 10px; font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .report-toggle { display: flex; border-radius: 12px; overflow: hidden; border: 2px solid var(--primary); }
        .report-toggle label { padding: 8px 16px; font-size: 14px; font-weight: 900; color: var(--primary); background: rgba(255,255,255,0.35); cursor: pointer; transition: background 0.2s, color 0.2s; display: flex; align-items: center; gap: 6px; user-select: none; }
        .report-toggle input[type="radio"] { display: none; }
        .report-toggle input[type="radio"]:checked + label { background: var(--primary); color: var(--gold); }
        .subchoice-row { background: rgba(255,255,255,0.15); border: 2px dashed var(--gold); padding: 12px; margin-bottom: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; animation: slideDown 0.3s ease; }
        .subchoice-row span { font-weight: 800; font-size: 14px; color: var(--gold); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        .submit-btn { width: 100%; padding: 18px; background: var(--cream); color: var(--primary); border: 5px solid var(--gold); border-radius: 20px; font-size: 22px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .overlay.show { visibility: visible; opacity: 1; }
        .popup { background: white; padding: 40px; border-radius: 25px; text-align: center; border: 5px solid var(--gold); width: 85%; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ✅ hidden iframe — الطريقة الوحيدة الضامنة مع Google Apps Script -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <header><h2>♱ KIRELLOS GEORGE ♱</h2></header>

    <div class="hero">
        <img src="Screenshot_2025-11-26_201754-removebg-preview.png" style="width:130px;">
        <h1>نوته تلمذه 2026</h1>
        <div class="badge">النوتة اليومية و الاسبوعيه</div>
    </div>

    <section class="form-section">

        <div class="row" id="dateRow">
            <span>التاريخ:</span>
            <input type="date" id="dateField">
        </div>

        <div class="row">
            <span>الاسم:</span>
            <input type="text" id="studentName" placeholder="اكتب اسمك رباعي">
        </div>

        <div class="row">
            <span>نوع التقرير:</span>
            <div class="report-toggle">
                <input type="radio" name="reportType" id="typeDaily" value="يومي" checked>
                <label for="typeDaily">📅 يومي</label>
                <input type="radio" name="reportType" id="typeWeekly" value="أسبوعي">
                <label for="typeWeekly">📆 أسبوعي</label>
            </div>
        </div>

        <div class="row">
            <span>الإنجيل:</span>
            <div class="options-group">
                <label>YES <input type="radio" name="gospel" value="Yes"></label>
                <label>NO  <input type="radio" name="gospel" value="No"></label>
            </div>
        </div>

        <div class="row">
            <span>الاعتراف:</span>
            <div class="options-group">
                <label>YES <input type="radio" name="confession" value="Yes"></label>
                <label>NO  <input type="radio" name="confession" value="No"></label>
            </div>
        </div>

        <div class="row">
            <span>التناول:</span>
            <div class="options-group">
                <label>YES <input type="radio" name="communion" value="Yes"></label>
                <label>NO  <input type="radio" name="communion" value="No"></label>
            </div>
        </div>

        <!-- حضور القداس — ظاهر دايماً -->
        <div class="subchoice-row">
            <span>⛪ حضور القداس:</span>
            <div class="options-group">
                <label>YES <input type="radio" name="massAttendance" value="Yes"></label>
                <label>NO  <input type="radio" name="massAttendance" value="No"></label>
            </div>
        </div>

        <div class="row">
            <span>الصلاة:</span>
            <div class="options-group">
                <label>باكر  <input type="checkbox" name="prayer" value="باكر"></label>
                <label>غروب <input type="checkbox" name="prayer" value="غروب"></label>
                <label>نوم   <input type="checkbox" name="prayer" value="نوم"></label>
            </div>
        </div>

        <div class="row">
            <span>حضور الاجتماع:</span>
            <div class="options-group">
                <label>YES <input type="radio" name="meetingAttendance" value="Yes" id="meetingYes"></label>
                <label>NO  <input type="radio" name="meetingAttendance" value="No"  id="meetingNo"></label>
            </div>
        </div>

        <div class="subchoice-row hidden" id="meetingTypeRow">
            <span>📋 نوع الاجتماع:</span>
            <div class="report-toggle">
                <input type="radio" name="meetingType" id="mtPrep" value="إعدادي">
                <label for="mtPrep">إعدادي</label>
                <input type="radio" name="meetingType" id="mtSec" value="ثانوي">
                <label for="mtSec">ثانوي</label>
            </div>
        </div>

        <div class="row">
            <span>الأشبين:</span>
            <select id="teacherSelect">
                <option value="">اختار اسم الأستاذ...</option>
                <option value="استاذ بيشوي كامل">استاذ بيشوي كامل</option>
                <option value="استاذ ايميل">استاذ ايميل</option>
                <option value="استاذ جوزيف">استاذ جوزيف</option>
                <option value="استاذ بيشوي صبري">استاذ بيشوي صبري</option>
                <option value="طاسوني ميرنا">طاسوني ميرنا</option>
                <option value="طاسوني اولفت">طاسوني اولفت</option>
                <option value="طاسوني داليا">طاسوني داليا</option>
                <option value="طاسوني امال">طاسوني امال</option>
                <option value="طاسوني اوديت">طاسوني اوديت</option>
                <option value="طاسوني كريستين">طاسوني كريستين</option>
            </select>
        </div>

        <button class="submit-btn" id="submitBtn">إرسال بنعمة الله</button>
    </section>

    <div id="overlay" class="overlay">
        <div class="popup">
            <div id="loader" class="spinner"></div>
            <div id="success" class="hidden">
                <svg viewBox="0 0 52 52" style="width:70px;height:70px;">
                    <circle cx="26" cy="26" r="25" fill="none" stroke="#4CAF50" stroke-width="3"/>
                    <path fill="none" stroke="#4CAF50" stroke-width="3" d="M14 27l7 7 16-16"/>
                </svg>
            </div>
            <h3 id="statusText">جاري الإرسال...</h3>
        </div>
    </div>

    <script>
        // ⚠️ غيّر الـ URL ده بالـ URL الجديد بتاعك
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxeQyPjV7w8xR2h1bPNEUy0rn5yzA5jO2KmyJDFDkVbthK5c8NVXdKhUaWZg6StNlvRyw/exec";

        // AUTO-FILL NAME
        const savedName = localStorage.getItem("notah_student_name");
        if (savedName) document.getElementById("studentName").value = savedName;
        document.getElementById("dateField").valueAsDate = new Date();

        // DATE HELPERS
        function toInputDate(d) {
            return d.getFullYear() + '-' +
                String(d.getMonth()+1).padStart(2,'0') + '-' +
                String(d.getDate()).padStart(2,'0');
        }
        function getWeekBounds() {
            const today = new Date();
            const day = today.getDay();
            const diffToSat = day >= 6 ? 0 : -(day + 1);
            const sat = new Date(today); sat.setDate(today.getDate() + diffToSat);
            const fri = new Date(sat);   fri.setDate(sat.getDate() + 6);
            return { from: sat, to: fri };
        }
        function updateDateRow(isWeekly) {
            const row = document.getElementById("dateRow");
            if (isWeekly) {
                const { from, to } = getWeekBounds();
                row.classList.add("date-weekly");
                row.innerHTML = `
                    <span>فترة الأسبوع:</span>
                    <div class="date-range-group">
                        <div class="date-range-item">
                            <label>📅 من</label>
                            <input type="date" id="dateFrom" value="${toInputDate(from)}">
                        </div>
                        <div class="date-range-item">
                            <label>📅 إلى</label>
                            <input type="date" id="dateTo" value="${toInputDate(to)}">
                        </div>
                    </div>`;
            } else {
                row.classList.remove("date-weekly");
                row.innerHTML = `<span>التاريخ:</span><input type="date" id="dateField" value="${toInputDate(new Date())}">`;
            }
        }
        document.querySelectorAll('input[name="reportType"]').forEach(r =>
            r.addEventListener("change", () => updateDateRow(r.value === "أسبوعي"))
        );

        // MEETING SUBCHOICE
        document.querySelectorAll('input[name="meetingAttendance"]').forEach(r => {
            r.addEventListener("change", () => {
                const row = document.getElementById("meetingTypeRow");
                if (r.value === "Yes" && r.checked) {
                    row.classList.remove("hidden");
                } else {
                    row.classList.add("hidden");
                    document.querySelectorAll('input[name="meetingType"]').forEach(x => x.checked = false);
                }
            });
        });

        // SUBMIT — hidden iframe (الطريقة الضامنة مع GAS)
        document.getElementById("submitBtn").onclick = () => {
            const name              = document.getElementById("studentName").value.trim();
            const reportType        = document.querySelector('input[name="reportType"]:checked')?.value || "يومي";
            const isWeekly          = reportType === "أسبوعي";
            const gospel            = document.querySelector('input[name="gospel"]:checked')?.value;
            const confession        = document.querySelector('input[name="confession"]:checked')?.value;
            const communion         = document.querySelector('input[name="communion"]:checked')?.value;
            const massAttendance    = document.querySelector('input[name="massAttendance"]:checked')?.value;
            const prayer            = Array.from(document.querySelectorAll('input[name="prayer"]:checked')).map(e => e.value).join(", ") || "لا يوجد";
            const meetingAttendance = document.querySelector('input[name="meetingAttendance"]:checked')?.value;
            const meetingType       = meetingAttendance === "Yes"
                ? (document.querySelector('input[name="meetingType"]:checked')?.value || "لم يُحدد")
                : "لا ينطبق";
            const teacher           = document.getElementById("teacherSelect").value;

            let date = "";
            if (isWeekly) {
                const df = document.getElementById("dateFrom")?.value;
                const dt = document.getElementById("dateTo")?.value;
                if (!df || !dt) { alert("اختار تاريخ بداية ونهاية الأسبوع!"); return; }
                date = df + " → " + dt;
            } else {
                date = document.getElementById("dateField")?.value;
                if (!date) { alert("اختار التاريخ!"); return; }
            }

            if (!name || !teacher || !gospel || !confession || !communion || !massAttendance || !meetingAttendance) {
                alert("يا بطل، فيه بيانات ناقصة! تأكد من اختيار كل الخانات.");
                return;
            }

            // Show overlay
            document.getElementById("overlay").classList.add("show");
            localStorage.setItem("notah_student_name", name);

            // ✅ إنشاء form وإرساله للـ hidden iframe — بيتجاوز CORS تماماً
            const form = document.createElement("form");
            form.method = "POST";
            form.action = SCRIPT_URL;
            form.target = "hidden_iframe";

            const fields = {
                name, date, reportType,
                gospel, confession,
                communion, massAttendance,
                prayer,
                meetingAttendance, meetingType,
                teacher
            };

            Object.entries(fields).forEach(([key, val]) => {
                const input = document.createElement("input");
                input.type  = "hidden";
                input.name  = key;
                input.value = val;
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);

            // 2.5 ثانية كافية لـ GAS يحفظ
            setTimeout(() => {
                document.getElementById("loader").classList.add("hidden");
                document.getElementById("success").classList.remove("hidden");
                document.getElementById("statusText").textContent = "تم بنعمة الله ✝️";
                setTimeout(() => location.reload(), 2000);
            }, 2500);
        };
    </script>
</body>
</html>
